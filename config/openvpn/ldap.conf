# ============================================================
# TechSecure — LDAP Authorization Configuration
# Used by openvpn-auth-ldap to enforce group membership.
# Path: /etc/openvpn/auth/ldap.conf
# ============================================================

<LDAP>
    # Active Directory controller address
    URL             ldap://192.168.10.10

    # Connection timeout in seconds
    Timeout         15

    # Set to "yes" to require LDAPS (port 636)
    # In this lab, TLS is disabled for simplicity
    TLSEnable       no

    # Service account used to query the directory
    # Replace with a dedicated read-only service account in production
    BindDN          "CN=Administrateur,CN=Users,DC=techsecure,DC=local"
    Password        "REPLACE_WITH_SERVICE_ACCOUNT_PASSWORD"

    FollowReferrals yes
</LDAP>

<Authorization>
    # Search base — root of the domain
    BaseDN          "DC=techsecure,DC=local"

    # Match the connecting user by sAMAccountName (Windows login)
    SearchFilter    "(&(objectClass=user)(sAMAccountName=%u))"

    # *** GROUP ENFORCEMENT ***
    # Access is DENIED unless the user is a member of the group below.
    RequireGroup    true

    <Group>
        # The OU where Techniciens_VPN is located
        BaseDN          "OU=TechSecure-Corp,DC=techsecure,DC=local"

        # Group filter
        SearchFilter    "(cn=Techniciens_VPN)"

        # Attribute that holds group members
        MemberAttribute "member"
    </Group>
</Authorization>
