# ============================================================
# TechSecure — OpenVPN Server Configuration
# Server: VPN01 (Debian 12) — 192.168.10.11
# ============================================================

# --- 1. Port and protocol ---
port 1194
proto udp
dev tun

# --- 2. Certificates (generated by easy-rsa, copied here) ---
ca   /etc/openvpn/ca.crt
cert /etc/openvpn/server.crt
key  /etc/openvpn/server.key
dh   /etc/openvpn/dh.pem

# --- 3. VPN subnet ---
# Clients receive addresses from 10.8.0.0/24
server 10.8.0.0 255.255.255.0

# --- 4. Push routes to clients ---
# Route internal LAN traffic through the VPN
push "route 192.168.10.0 255.255.255.0"
# Set DC01 as DNS server for clients
push "dhcp-option DNS 192.168.10.10"

# --- 5. Security and stability ---
keepalive 10 120
cipher AES-256-CBC
user nobody
group nogroup
persist-key
persist-tun
status /var/log/openvpn-status.log
verb 3
explicit-exit-notify 1

# --- 6. Authorization plugin ---
# Choose ONE of the following plugin lines depending on your setup.

# Option A — Direct LDAP group check (openvpn-auth-ldap)
# Requires: sudo apt install openvpn-auth-ldap
# Enforces membership in the Techniciens_VPN AD group.
plugin /usr/lib/openvpn/openvpn-auth-ldap.so "/etc/openvpn/auth/ldap.conf"

# Option B — RADIUS AAA via PAM (FreeRADIUS → AD)
# Requires: freeradius, libpam-radius-auth configured
# Uncomment to switch to the RADIUS chain:
#plugin /usr/lib/x86_64-linux-gnu/openvpn/plugins/openvpn-plugin-auth-pam.so openvpn
